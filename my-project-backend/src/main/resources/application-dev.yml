# 开发环境配置
logging:
  level:
    com.example.filter.FlowLimitingFilter: DEBUG
springdoc:
  paths-to-match: /api/**
  swagger-ui:
    operations-sorter: alpha
spring:
  config:
    import: "optional:file:./.env"
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_DISCOVERY_ENABLED:true}
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
  data:
    redis:
      database: 1
  mail:
    host: smtp.163.com
    username: ${STMP_EMAIL:}
    password: ${STMP_EMAIL_PASSWORD:}
  rabbitmq:
    addresses: localhost
    username: admin
    password: admin
    virtual-host: /
    listener:
      simple:
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000ms
  elasticsearch:
    uris: localhost:9200
    username: elastic
    password: 123456
  datasource:
    url: jdbc:mysql://localhost:3306/study_main
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  security:
    jwt:
      key: 'abcdefghijklmn'
      expire: 72
      limit:
        base: 10
        upgrade: 300
        frequency: 30
    filter:
      order: -100
  web:
    verify:
      mail-limit: 60
    flow:
      period: 3
      limit: 3000
      block: 5
    cors:
      enabled: ${BACKEND_CORS_ENABLED:false}
      origin: '*'
      credentials: false
      methods: '*'
  minio:
    endpoint: 'http://localhost:9000'
    username: 'minio'
    password: 'password'
  weather:
    api-host: 'jx46h4hdc6.re.qweatherapi.com'
    key: ${WEATHER_KEY:}
  ai:
    deepseek:
      api-key: ${DEEPSEEK_KEY:}
      base-url: 'https://api.deepseek.com'
    tavily:
      api-key: ${TAVILY_API_KEY:}
    siliconflow:
      api-key: ${SILICONFLOW_API_KEY:}
internal:
  service:
    token: ${INTERNAL_SERVICE_TOKEN:change-me-in-production}
