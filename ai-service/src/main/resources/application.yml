server:
  port: ${AI_SERVER_PORT:8083}

spring:
  application:
    name: ai-service
  config:
    import: "optional:file:./.env"
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_DISCOVERY_ENABLED:true}
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
    openfeign:
      client:
        config:
          default:
            connect-timeout: 5000
            read-timeout: 15000
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/study_main}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  ai:
    deepseek:
      api-key: ${DEEPSEEK_KEY:}
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
    tavily:
      api-key: ${TAVILY_API_KEY:}
    siliconflow:
      api-key: ${SILICONFLOW_API_KEY:}

internal:
  service:
    token: ${INTERNAL_SERVICE_TOKEN:change-me-in-production}

management:
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  file:
    name: ${LOG_DIR:log}/${spring.application.name}.json
  structured:
    format:
      console: ${LOG_CONSOLE_FORMAT:logstash}
      file: ${LOG_FILE_FORMAT:logstash}
    json:
      add:
        application: ${spring.application.name}
        environment: ${APP_ENV:dev}
      stacktrace:
        max-length: 8192
  logback:
    rollingpolicy:
      max-history: 14
      max-file-size: 50MB
      total-size-cap: 2GB
