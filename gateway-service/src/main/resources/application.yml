server:
  port: ${GATEWAY_SERVER_PORT:8081}

spring:
  application:
    name: gateway-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:1}
  security:
    jwt:
      key: ${JWT_KEY:abcdefghijklmn}
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_DISCOVERY_ENABLED:true}
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
    gateway:
      server:
        webflux:
          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                allowed-origin-patterns:
                  - ${GATEWAY_CORS_ALLOWED_ORIGIN:http://127.0.0.1:5273}
                  - ${GATEWAY_CORS_ALLOWED_ORIGIN_ALT:http://localhost:5273}
                allowed-methods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                  - PATCH
                allowed-headers:
                  - '*'
                exposed-headers:
                  - Authorization
                allow-credentials: false
                max-age: 3600
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials RETAIN_FIRST
          routes:
            - id: ai-service
              uri: lb://ai-service
              order: -20
              predicates:
                - Path=/api/ai/**
              metadata:
                response-timeout: -1
            - id: oss-service
              uri: lb://oss-service
              order: -10
              predicates:
                - Path=/api/image/**,/api/file/**,/images/**
            - id: user-service
              uri: lb://user-service
              order: -5
              predicates:
                - Path=/api/auth/**,/api/user/**,/api/admin/user/**,/api/admin/email/**
            - id: notification-service
              uri: lb://notification-service
              order: -3
              predicates:
                - Path=/api/notification/**
            - id: forum-monolith-service
              uri: lb://forum-monolith-service
              predicates:
                - Path=/api/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

internal:
  service:
    token: ${INTERNAL_SERVICE_TOKEN:change-me-in-production}
