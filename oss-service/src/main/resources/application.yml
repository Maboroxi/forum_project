server:
  port: ${OSS_SERVER_PORT:8082}

spring:
  application:
    name: oss-service
  profiles:
    active: '@environment@'
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

management:
  endpoints:
    web:
      exposure:
        include: health,info

internal:
  service:
    token: ${INTERNAL_SERVICE_TOKEN:change-me-in-production}
