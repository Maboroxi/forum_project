server:
  port: ${USER_SERVICE_PORT:8084}

spring:
  application:
    name: user-service
  config:
    import: "optional:file:./.env"
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_DISCOVERY_ENABLED:true}
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
    openfeign:
      client:
        config:
          default:
            connect-timeout: 5000
            read-timeout: 15000
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/study_main}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      database: ${REDIS_DATABASE:1}
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  rabbitmq:
    addresses: ${RABBITMQ_HOST:localhost}
    username: ${RABBITMQ_USERNAME:admin}
    password: ${RABBITMQ_PASSWORD:admin}
    virtual-host: /
    listener:
      simple:
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000ms
  mail:
    host: smtp.163.com
    username: ${STMP_EMAIL:}
    password: ${STMP_EMAIL_PASSWORD:}
  security:
    jwt:
      key: ${JWT_KEY:abcdefghijklmn}
      expire: ${JWT_EXPIRE:72}
      limit:
        base: 10
        upgrade: 300
        frequency: 30
  web:
    verify:
      mail-limit: 60
    flow:
      period: 3
      limit: 3000
      block: 5

internal:
  service:
    token: ${INTERNAL_SERVICE_TOKEN:change-me-in-production}

management:
  endpoints:
    web:
      exposure:
        include: health,info
