server:
  port: ${OSS_SERVER_PORT:8082}

spring:
  application:
    name: oss-service
  profiles:
    active: '@environment@'
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

management:
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  file:
    name: ${LOG_DIR:log}/${spring.application.name}.json
  structured:
    format:
      console: ${LOG_CONSOLE_FORMAT:logstash}
      file: ${LOG_FILE_FORMAT:logstash}
    json:
      add:
        application: ${spring.application.name}
        environment: ${APP_ENV:dev}
      stacktrace:
        max-length: 8192
  logback:
    rollingpolicy:
      max-history: 14
      max-file-size: 50MB
      total-size-cap: 2GB

internal:
  service:
    token: ${INTERNAL_SERVICE_TOKEN:change-me-in-production}
