server:
  port: ${NOTIFICATION_SERVICE_PORT:8087}

spring:
  application:
    name: notification-service
  config:
    import: "optional:file:./.env"
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_DISCOVERY_ENABLED:true}
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/study_main}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  rabbitmq:
    addresses: ${RABBITMQ_HOST:localhost}
    username: ${RABBITMQ_USERNAME:admin}
    password: ${RABBITMQ_PASSWORD:admin}
    virtual-host: /
    listener:
      simple:
        observation-enabled: true
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000ms
    template:
      observation-enabled: true

internal:
  service:
    token: ${INTERNAL_SERVICE_TOKEN:change-me-in-production}

management:
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  file:
    name: ${LOG_DIR:log}/${spring.application.name}.json
  structured:
    format:
      console: ${LOG_CONSOLE_FORMAT:logstash}
      file: ${LOG_FILE_FORMAT:logstash}
    json:
      add:
        application: ${spring.application.name}
        environment: ${APP_ENV:dev}
      stacktrace:
        max-length: 8192
  logback:
    rollingpolicy:
      max-history: 14
      max-file-size: 50MB
      total-size-cap: 2GB
