services:
  # ============================================================
  # Nacos - 服务注册/发现
  # 控制台/API: http://localhost:8848
  # gRPC: localhost:9848 / localhost:9849
  # ============================================================
  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: forum-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
      JVM_XMS: 256m
      JVM_XMX: 512m
      JVM_XMN: 128m
    ports:
      - "8848:8848"   # 控制台与 OpenAPI
      - "9848:9848"   # 客户端 gRPC 通信端口
      - "9849:9849"   # 服务端 gRPC 通信端口
    volumes:
      - nacos-data:/home/nacos/data
      - nacos-logs:/home/nacos/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ============================================================
  # Redis 7 - 缓存/限流/JWT黑名单
  # 端口: localhost:6379
  # 注意: 项目使用 database 1，无密码
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: forum-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # MySQL 8.0 - 主数据库
  # 端口: localhost:3306
  # ============================================================
  mysql:
    image: mysql:8.0
    container_name: forum-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: study_main
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_0900_ai_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ../study.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ============================================================
  # Elasticsearch 8.x - 全文搜索
  # HTTP: http://localhost:9200（本地开发使用密码认证）
  # ============================================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.18.8
    container_name: forum-es
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - ELASTIC_PASSWORD=123456
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "-u", "elastic:123456", "http://localhost:9200/_cluster/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ============================================================
  # RabbitMQ 3.x - 消息队列（邮件发送、错误日志）
  # AMQP: localhost:5672
  # 管理界面: http://localhost:15672
  # ============================================================
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: forum-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672"    # AMQP 协议端口
      - "15672:15672"  # 管理界面端口
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # MinIO - 对象存储（图片上传）
  # API: http://localhost:9000
  # 管理界面: http://localhost:9001
  # ============================================================
  minio:
    image: quay.io/minio/minio:latest
    container_name: forum-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: password
    ports:
      - "9000:9000"   # S3 API 端口
      - "9001:9001"   # Web 管理界面端口
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Observability - logs, traces, metrics and dashboards
  # Grafana: http://localhost:3000
  # ============================================================
  loki:
    image: grafana/loki:3.4.2
    container_name: forum-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki.yml:/etc/loki/config.yml:ro
      - loki-data:/loki

  tempo:
    image: grafana/tempo:2.7.2
    container_name: forum-tempo
    restart: unless-stopped
    command: -config.file=/etc/tempo/config.yml
    ports:
      - "3200:3200"
    volumes:
      - ./observability/tempo.yml:/etc/tempo/config.yml:ro
      - tempo-data:/var/tempo

  alloy:
    image: grafana/alloy:v1.8.2
    container_name: forum-alloy
    restart: unless-stopped
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - /etc/alloy/config.alloy
    ports:
      - "12345:12345"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./observability/alloy.config:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../log:/var/log/forum/project-root:ro
      - ../gateway-service/log:/var/log/forum/gateway-service:ro
      - ../forum-service/log:/var/log/forum/forum-service:ro
      - ../oss-service/log:/var/log/forum/oss-service:ro
      - ../ai-service/log:/var/log/forum/ai-service:ro
      - ../user-service/log:/var/log/forum/user-service:ro
      - ../notification-service/log:/var/log/forum/notification-service:ro
      - ../announcement-service/log:/var/log/forum/announcement-service:ro
      - alloy-data:/var/lib/alloy
    depends_on:
      - loki
      - tempo

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: forum-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus-data:/prometheus

  node-exporter:
    image: prom/node-exporter:v1.9.0
    container_name: forum-node-exporter
    restart: unless-stopped
    command:
      - --path.rootfs=/host
    pid: host
    volumes:
      - /:/host:ro

  grafana:
    image: grafana/grafana:11.6.0
    container_name: forum-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change-me}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - loki
      - tempo
      - prometheus

volumes:
  nacos-data:
  nacos-logs:
  redis-data:
  mysql-data:
  es-data:
  rabbitmq-data:
  minio-data:
  loki-data:
  tempo-data:
  alloy-data:
  prometheus-data:
  grafana-data:
